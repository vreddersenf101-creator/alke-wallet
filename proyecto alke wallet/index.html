<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* LOGIN */
        #dashboard {
            display: none;
        }

        .login-card {
            max-width: 450px;
            margin: 80px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .1);
        }

        /* SIDEBAR */
        .sidebar {
            background: #0d1b2a;
            min-height: 100vh;
            color: white;
            padding: 25px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: #1b263b;
        }

        /* TARJETAS */
        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
            height: 100%;
        }

        /* SALDO */
        .saldo-card {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
        }

        .saldo {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 0;
        }

        /* BOTONES */
        .btn {
            border-radius: 10px;
        }

        /* HISTORIAL */
        .historial {
            max-height: 300px;
            overflow-y: auto;
        }

        .titulo-seccion {
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login">

        <div class="card login-card p-4">

            <h2 class="text-center mb-4">
                <i class="bi bi-wallet2"></i>
                Alke Wallet
            </h2>

            <input type="text"
                id="usuario"
                class="form-control mb-3"
                placeholder="Usuario">

            <input type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Contraseña">

            <button id="btnLogin"
                class="btn btn-primary">
                Iniciar Sesión
            </button>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

        <div class="container-fluid">

            <div class="row">

                <!-- SIDEBAR -->
                <div class="col-lg-2 sidebar">

                    <h2>Alke Wallet</h2>

                    <a href="#">
                        <i class="bi bi-house-door-fill"></i>
                        Inicio
                    </a>

                    <a href="#">
                        <i class="bi bi-cash-stack"></i>
                        Fondos
                    </a>

                    <a href="#">
                        <i class="bi bi-people-fill"></i>
                        Contactos
                    </a>

                    <a href="#">
                        <i class="bi bi-clock-history"></i>
                        Historial
                    </a>

                    <button id="cerrarSesion"
                        class="btn btn-danger w-100 mt-4">
                        Cerrar Sesión
                    </button>

                </div>

                <!-- CONTENIDO -->
                <div class="col-lg-10 p-4">

                    <!-- SALDO -->
                    <div class="card saldo-card p-4 mb-4">

                        <h5>Saldo Disponible</h5>

                        <p class="saldo">
                            $<span id="saldo">100000</span>
                        </p>

                    </div>

                    <!-- TARJETAS -->
                    <div class="row g-4">

                        <!-- CONTACTOS -->
                        <div class="col-md-4">

                            <div class="card p-4">

                                <h5 class="titulo-seccion">
                                    <i class="bi bi-person-plus-fill"></i>
                                    Contactos
                                </h5>

                                <input type="text"
                                    id="nuevoContacto"
                                    class="form-control mb-3"
                                    placeholder="Nombre del contacto">

                                <button id="agregarContacto"
                                    class="btn btn-success mb-3">
                                    Agregar Contacto
                                </button>

                                <ul id="listaContactos"
                                    class="list-group">
                                </ul>

                            </div>

                        </div>

                        <!-- DEPÓSITO Y RETIRO -->
                        <div class="col-md-4">

                            <div class="card p-4 mb-4">

                                <h5 class="titulo-seccion">
                                    <i class="bi bi-plus-circle-fill"></i>
                                    Depositar
                                </h5>

                                <input type="number"
                                    id="deposito"
                                    class="form-control mb-3"
                                    placeholder="Monto">

                                <button id="btnDepositar"
                                    class="btn btn-primary">
                                    Depositar
                                </button>

                            </div>

                            <div class="card p-4">

                                <h5 class="titulo-seccion">
                                    <i class="bi bi-dash-circle-fill"></i>
                                    Retirar
                                </h5>

                                <input type="number"
                                    id="retiro"
                                    class="form-control mb-3"
                                    placeholder="Monto">

                                <button id="btnRetirar"
                                    class="btn btn-warning">
                                    Retirar
                                </button>

                            </div>

                        </div>

                        <!-- TRANSFERENCIA -->
                        <div class="col-md-4">

                            <div class="card p-4">

                                <h5 class="titulo-seccion">
                                    <i class="bi bi-send-fill"></i>
                                    Transferencia
                                </h5>

                                <select id="contactoTransferencia"
                                    class="form-select mb-3">

                                    <option>
                                        Seleccione un contacto
                                    </option>

                                </select>

                                <input type="number"
                                    id="montoTransferencia"
                                    class="form-control mb-3"
                                    placeholder="Monto">

                                <button id="btnTransferir"
                                    class="btn btn-info text-white">
                                    Transferir
                                </button>

                            </div>

                        </div>

                    </div>

                    <!-- HISTORIAL -->
                    <div class="card p-4 mt-4">

                        <h5 class="titulo-seccion">
                            <i class="bi bi-clock-history"></i>
                            Historial de Transacciones
                        </h5>

                        <ul id="historial"
                            class="list-group historial">
                        </ul>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        let saldo = 100000;

        // LOGIN
        $("#btnLogin").click(function () {

            let usuario = $("#usuario").val();
            let password = $("#password").val();

            if (usuario !== "" && password !== "") {

                $("#login").hide();
                $("#dashboard").show();

            } else {

                alert("Debe ingresar usuario y contraseña");

            }

        });

        // LOGOUT
        $("#cerrarSesion").click(function () {

            $("#dashboard").hide();
            $("#login").show();

        });

        // HISTORIAL
        function agregarHistorial(texto) {

            $("#historial").prepend(
                `<li class="list-group-item">${texto}</li>`
            );

        }

        // CONTACTOS
        $("#agregarContacto").click(function () {

            let contacto = $("#nuevoContacto").val();

            if (contacto !== "") {

                $("#listaContactos").append(
                    `<li class="list-group-item">${contacto}</li>`
                );

                $("#contactoTransferencia").append(
                    `<option>${contacto}</option>`
                );

                agregarHistorial(
                    "Nuevo contacto agregado: " + contacto
                );

                $("#nuevoContacto").val("");

            }

        });

        // DEPÓSITO
        $("#btnDepositar").click(function () {

            let monto = Number($("#deposito").val());

            if (monto > 0) {

                saldo += monto;

                $("#saldo").text(saldo);

                agregarHistorial(
                    "Depósito realizado por $" + monto
                );

                $("#deposito").val("");

            }

        });

        // RETIRO
        $("#btnRetirar").click(function () {

            let monto = Number($("#retiro").val());

            if (monto > 0 && monto <= saldo) {

                saldo -= monto;

                $("#saldo").text(saldo);

                agregarHistorial(
                    "Retiro realizado por $" + monto
                );

                $("#retiro").val("");

            } else {

                alert("Saldo insuficiente");

            }

        });

        // TRANSFERENCIA
        $("#btnTransferir").click(function () {

            let contacto =
                $("#contactoTransferencia").val();

            let monto =
                Number($("#montoTransferencia").val());

            if (
                monto > 0 &&
                monto <= saldo &&
                contacto !== "Seleccione un contacto"
            ) {

                saldo -= monto;

                $("#saldo").text(saldo);

                agregarHistorial(
                    `Transferencia de $${monto} a ${contacto}`
                );

                $("#montoTransferencia").val("");

            } else {

                alert("Verifique los datos");

            }

        });

    </script>

</body>

</html>
